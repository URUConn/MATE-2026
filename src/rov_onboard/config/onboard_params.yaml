/**:
  ros__parameters:
    # Camera configuration
    camera_index: 0
    frame_width: 640        # Lower resolution for better performance on limited bandwidth
    frame_height: 480
    fps: 60
    publish_compressed: true
    jpeg_quality: 50
    use_gstreamer: true    # Set to true if GStreamer is available
    fallback_on_error: true # Allow ROV to operate without camera

    armed: false
    publish_rate: 10.0

    # MAVROS Bridge configuration (PIX6 flight controller)
    mavros_bridge_node:
      ros__parameters:
        # Set to true ONLY after hardware is fully configured and tested
        armed: false
        
        # PIX6 serial port (check with: ls /dev/ttyACM* or /dev/ttyUSB*)
        # Common values: /dev/ttyACM0, /dev/ttyUSB0
        fcu_port: "/dev/ttyACM0"
        
        # Serial baud rate (must match PIX6 configuration)
        fcu_baud: 115200
        
        # Thrust scaling factor (1.0 = full scale, 0.5 = half scale for safety)
        thrust_scaling: 0.5
        
        # RC PWM limits (standard RC servo range)
        rc_min_pwm: 1000
        rc_max_pwm: 2000
        rc_center_pwm: 1500
