/**:
  ros__parameters:
    window_name: 'ROV Camera Feed'
    publish_rate: 50.0
    deadzone: 0.1
    max_power: 1.0
    # Force keyboard mode for testing without a controller.
    # Set this to false when using a real Xbox controller.
    force_keyboard_mode: true
    display_rate: 20.0
    
    # Gamepad node parameters
    gamepad_node:
      ros__parameters:
        publish_rate: 50.0
        deadzone: 0.1
        max_power: 1.0
        # Set to true to enable keyboard fallback when no gamepad is detected
        use_keyboard_fallback: true
